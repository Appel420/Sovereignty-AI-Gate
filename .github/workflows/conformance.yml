name: Conformance Checks

on:
  push:
    branches: ["main", "copilot/**", "feature/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/py312.txt -e ".[dev]"

      - name: Run conformance tests only
        run: pytest tests/conformance/ -v --tb=short

      - name: Run governance tests
        run: pytest tests/governance/ -v --tb=short
