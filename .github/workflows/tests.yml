name: Python Tests

on:
  push:
    branches: ["main", "copilot/**", "feature/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/py312.txt -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage
        run: pytest --cov=sia --cov-report=term-missing -q

  dependency-hardening:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/py312.txt -e ".[dev]"
          npm ci

      - name: Validate dependency policy
        run: python scripts/check_dependency_policy.py

      - name: Validate SBOM is current
        run: python scripts/generate_sbom.py --check docs/compliance/fedramp_phase4/sbom.json

      - name: Validate cloud and CI security config
        run: python scripts/validate_cloud_config.py
