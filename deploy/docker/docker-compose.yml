version: "3.9"

services:
  sia-dashboard:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: sovereignty-ai-gate:0.1.0
    container_name: sia_dashboard
    user: "1001:1001"
    ports:
      - "9898:9898"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - SIA_OFFLINE=1
      - SIA_ALLOW_CLOUD=0
    volumes:
      - sia_state:/app/state
    networks:
      - sia_internal

volumes:
  sia_state:
    driver: local

networks:
  sia_internal:
    internal: true
